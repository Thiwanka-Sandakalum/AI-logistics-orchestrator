services:
  postgres:
    image: postgres:16-alpine
    container_name: aio-postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: devdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devuser -d devdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aio-langgraph-api
    env_file:
      - .env
    environment:
      POSTGRES_URI: postgresql://devuser:devpass123@postgres:5432/devdb
      # Use host.docker.internal to call services running on your host machine.
      EXISTING_API_BASE_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "2024:2024"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./chat-ui
      dockerfile: apps/web/Dockerfile
    container_name: aio-chat-ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: [ "npm", "run", "start", "--", "-H", "0.0.0.0", "-p", "3000" ]
    restart: unless-stopped

volumes:
  postgres_data:
