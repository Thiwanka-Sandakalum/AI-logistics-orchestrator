<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loomis Brain Service Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-6 mt-10">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-700 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-500" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8c-1.657 0-3 1.343-3 3 0 1.657 1.343 3 3 3s3-1.343 3-3c0-1.657-1.343-3-3-3zm0 10c-4.418 0-8-1.79-8-4V7a2 2 0 012-2h12a2 2 0 012 2v7c0 2.21-3.582 4-8 4z" />
            </svg>
            Loomis Brain Service Chat
        </h1>
        <div id="chat-window" class="h-72 overflow-y-auto border rounded p-3 bg-gray-50 mb-4 flex flex-col gap-2"></div>
        <form id="chat-form" class="flex gap-2">
            <input id="user-input" type="text"
                class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300"
                placeholder="Type your message..." autocomplete="off" required />
            <button type="submit"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Send</button>
        </form>
    </div>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function formatTime() {
            const d = new Date();
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function appendMessage(sender, text, isLoading = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex items-end gap-2 ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            const avatar = document.createElement('div');
            avatar.className = 'w-8 h-8 rounded-full flex items-center justify-center ' + (sender === 'user' ? 'bg-blue-500 text-white' : 'bg-gray-300 text-gray-700');
            avatar.innerHTML = sender === 'user'
                ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 15c2.5 0 4.847.655 6.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3 0 1.657 1.343 3 3 3s3-1.343 3-3c0-1.657-1.343-3-3-3zm0 10c-4.418 0-8-1.79-8-4V7a2 2 0 012-2h12a2 2 0 012 2v7c0 2.21-3.582 4-8 4z" /></svg>';
            const bubble = document.createElement('div');
            bubble.className = `max-w-[70%] px-3 py-2 rounded-lg shadow ${sender === 'user' ? 'bg-blue-500 text-white rounded-br-none' : 'bg-gray-200 text-gray-800 rounded-bl-none'} ${isLoading ? 'opacity-70' : ''}`;
            bubble.innerHTML = text;
            const meta = document.createElement('div');
            meta.className = 'text-xs text-gray-400 mt-1';
            meta.textContent = formatTime();
            const col = document.createElement('div');
            col.className = 'flex flex-col';
            col.appendChild(bubble);
            col.appendChild(meta);
            if (sender === 'user') {
                msgDiv.appendChild(col);
                msgDiv.appendChild(avatar);
            } else {
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(col);
            }
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showLoading() {
            appendMessage('bot', '<span class="flex items-center gap-1"><svg class="animate-spin h-4 w-4 mr-1 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>Thinking...</span>', true);
        }

        function removeLoading() {
            const bubbles = chatWindow.querySelectorAll('.opacity-70');
            bubbles.forEach(b => b.parentElement.parentElement.remove());
        }


        function renderHistory(history) {
            chatWindow.innerHTML = '';
            if (!Array.isArray(history)) return;
            for (const [sender, message, timestamp] of history) {
                appendMessage(sender === 'user' ? 'user' : 'bot', message);
            }
        }

        let sessionId = null;

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;
            appendMessage('user', message);
            userInput.value = '';
            userInput.focus();
            showLoading();
            try {
                const payload = { message };
                if (sessionId) payload.session_id = sessionId;
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                removeLoading();
                if (data.session_id) sessionId = data.session_id;
                if (data.history) {
                    renderHistory(data.history);
                }
                // Show error details if present
                if (data.error_code) {
                    let details = '';
                    if (data.error_details) {
                        details = `<br><span class='text-xs text-gray-500'>Details: ${JSON.stringify(data.error_details)}</span>`;
                    }
                    appendMessage('bot', `<span class='text-red-500'>Error: ${data.error || 'An error occurred.'}<br><span class='font-semibold'>Code:</span> ${data.error_code}${details}</span>`);
                    // Optionally, prompt for correction if missing slot
                    if (data.error_code === 'MISSING_SLOT' && data.error_details && data.error_details.missing_slot) {
                        appendMessage('bot', `<span class='text-blue-600'>Please provide: <b>${data.error_details.missing_slot.replace('_', ' ')}</b></span>`);
                    }
                } else if (data.error) {
                    appendMessage('bot', `<span class='text-red-500'>Error: ${data.error}</span>`);
                }
            } catch (err) {
                removeLoading();
                appendMessage('bot', '<span class="text-red-500">Network error.</span>');
            }
        });

        // Autofocus input on load
        window.onload = () => userInput.focus();
    </script>
</body>

</html>
